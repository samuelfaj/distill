name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DISTILL_DATASET_ENABLED: "false"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build current platform binary
        run: npm run build

      - name: Verify current platform release inputs
        run: bun run scripts/release-check.ts

      - name: Smoke packed packages
        run: npm run smoke:pack

  release-dry-run:
    name: release dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace
        run: npm install

      - name: Build all platform binaries
        env:
          DISTILL_BUILD_ALL: "1"
        run: npm run build

      - name: Apply platform metadata
        run: npm run prepare:publish-platforms

      - name: Verify publish inputs
        run: bun run scripts/release-check.ts --publish
