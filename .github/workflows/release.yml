name: release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DISTILL_DATASET_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Install workspace
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build platform binaries
        env:
          DISTILL_BUILD_ALL: "1"
        run: npm run build

      - name: Apply platform metadata
        run: npm run prepare:publish-platforms

      - name: Verify release inputs
        run: bun run scripts/release-check.ts --publish

      - name: Smoke packed packages
        run: npm run smoke:pack

      - name: Publish platform packages
        run: |
          package_version="$(node -p "require('./packages/cli/package.json').version")"

          publish_if_missing() {
            package_name="$1"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} already published; skipping."
              return 0
            fi

            npm publish --workspace "${package_name}" --access public
          }

          publish_if_missing @samuelfaj/distill-darwin-arm64
          publish_if_missing @samuelfaj/distill-darwin-x64
          publish_if_missing @samuelfaj/distill-linux-arm64
          publish_if_missing @samuelfaj/distill-linux-x64

          if npm view @samuelfaj/distill-win32-x64 version >/dev/null 2>&1; then
            publish_if_missing @samuelfaj/distill-win32-x64
          else
            echo "@samuelfaj/distill-win32-x64 does not exist on npm yet; skipping until the package is created."
          fi

      - name: Publish main package
        run: |
          package_version="$(node -p "require('./packages/cli/package.json').version")"

          if npm view "@samuelfaj/distill@${package_version}" version >/dev/null 2>&1; then
            echo "@samuelfaj/distill@${package_version} already published; skipping."
          else
            npm publish --workspace @samuelfaj/distill --access public
          fi
