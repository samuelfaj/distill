name: release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build platform binaries
        env:
          DISTILL_BUILD_ALL: "1"
        run: npm run build

      - name: Apply platform metadata
        run: npm run prepare:publish-platforms

      - name: Verify release inputs
        run: bun run scripts/release-check.ts --publish

      - name: Smoke packed packages
        run: npm run smoke:pack

      - name: Publish platform packages
        run: |
          npm publish --workspace @samuelfaj/distill-darwin-arm64 --access public
          npm publish --workspace @samuelfaj/distill-darwin-x64 --access public
          npm publish --workspace @samuelfaj/distill-linux-arm64 --access public
          npm publish --workspace @samuelfaj/distill-linux-x64 --access public
          npm publish --workspace @samuelfaj/distill-win32-x64 --access public

      - name: Publish main package
        run: npm publish --workspace @samuelfaj/distill --access public
